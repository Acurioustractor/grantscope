  - working_tree_clean_of_user_code: After all merges, `git diff origin/main..wip/working-tree-snapshot-2026-04-24 --stat | tail -1` shows only the schema-blocked buckets remaining.
  - vercel_checks_nongating: Vercel Preview is not a required check but `Vercel Preview Comments` is. The deploy itself can go PENDING for minutes without blocking merge if you use `--auto`.
  - stacked_pr_auto_close: When you delete a base branch via `gh pr merge --delete-branch`, any PRs that target that branch are auto-CLOSED (not retargeted). Recovery is rebase+new-PR.

worked:
  - `gh pr list --state open --json number,mergeable,statusCheckRollup` with a python3 pipe gives a compact per-PR status table — use instead of `gh pr checks <n>` in bulk.
  - `git rebase origin/main` on a stacked branch after the base squash-merges cleanly drops the duplicate commits automatically ("warning: skipped previously applied commit").
  - `gh pr merge --squash --delete-branch --auto` lets you queue a merge that completes once required checks go green, avoiding manual poll loops.
  - When the base branch of an open PR is deleted, the PR moves to CLOSED (not MERGED). Reopening fails; rebase + new PR is the only recovery.
  - Always commit handoffs to `thoughts/shared/handoffs/general/` with the filename pattern `YYYY-MM-DD_HH-MM_<short-description>.yaml` — matches SessionStart hook expectations.

failed:
  - Deleting the alerts-infra base branch via `--delete-branch` auto-closed 4 dependent PRs (#12 #15 #16 #17). Had to rebase each branch onto new-main and open fresh PRs (#18-#21). Future rule: when squash-merging a PR that is the base of other open PRs, either (a) retarget the dependents to main FIRST via `gh pr edit --base main`, or (b) merge without `--delete-branch` and let the auto-retarget-on-default-base kick in, then delete the branch manually.

