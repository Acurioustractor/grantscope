decisions:
  - stack_rebase_over_reopen: When the 4 stacked PRs auto-closed after their base was deleted, chose to rebase each onto new-main + open fresh PRs (#18-#21) instead of trying to reopen the closed ones. GitHub's `gh pr reopen` fails if the original base no longer exists; rebase+reopen-as-new is the clean path.
  - auto_merge_with_admin: Used `gh pr merge --squash --delete-branch --auto` for #23 when Vercel preview was still pending — lets GitHub merge as soon as all required checks go green without blocking on Vercel deploy (Vercel is non-gating).
  - package_json_scripts_before_backing_files: Merged package.json script additions (preflight, signoff, bittensor, tracker) even though `grantscope-signoff.mjs` and `bittensor-money-model.mjs` don't exist on main yet. Registered-but-unbacked scripts only error if invoked; doesn't fail CI or typecheck. Backing files will land in scripts-misc once schema is sorted.
  - skip_all_migrations_for_now: Every .sql file in the snapshot's supabase/migrations/ was left out of all carves. One touches a table that may already exist in prod; another normalizes JSONB shape that may be in use; reconciliation > optimism.

