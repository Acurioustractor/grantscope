<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; overflow-x: hidden; }

  .header { text-align: center; padding: 40px 20px 20px; }
  .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; }
  .header h1 span { color: #059669; }
  .header p { color: #94a3b8; margin-top: 8px; font-size: 14px; }

  .legend { display: flex; justify-content: center; gap: 24px; padding: 12px 20px 30px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  svg { display: block; margin: 0 auto; }

  .node { cursor: pointer; transition: filter 0.2s; }
  .node:hover { filter: brightness(1.2) drop-shadow(0 0 8px rgba(255,255,255,0.15)); }
  .node rect, .node circle { transition: stroke-width 0.2s; }
  .node:hover rect, .node:hover circle { stroke-width: 3; }

  .flow-line { stroke-dasharray: 8 4; animation: flow 1.5s linear infinite; }
  .flow-line-reverse { stroke-dasharray: 8 4; animation: flow-reverse 1.5s linear infinite; }
  @keyframes flow { to { stroke-dashoffset: -24; } }
  @keyframes flow-reverse { to { stroke-dashoffset: 24; } }

  .planned { opacity: 0.4; stroke-dasharray: 4 4; }
  .planned-fill { opacity: 0.35; }

  .tooltip {
    position: fixed; background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    padding: 12px 16px; font-size: 13px; max-width: 320px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; z-index: 100; line-height: 1.5;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .tooltip.show { opacity: 1; }
  .tooltip h4 { font-size: 14px; margin-bottom: 4px; color: #f8fafc; }
  .tooltip .stat { color: #059669; font-weight: 600; }
  .tooltip .planned-tag { color: #d97706; font-style: italic; }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; fill: #475569; font-weight: 600; }
  .count-badge { font-size: 10px; fill: #f8fafc; font-weight: 700; }
  .status-live { fill: #059669; }
  .status-partial { fill: #d97706; }
  .status-planned { fill: #64748b; }

  .phase-box { fill: none; stroke-dasharray: 6 3; rx: 12; }
</style>
</head>

<div class="tooltip" id="tooltip"></div>

<script>
const tooltip = document.getElementById('tooltip');

document.querySelectorAll('[data-tip]').forEach(el => {
  el.addEventListener('mouseenter', e => {
    const parts = el.dataset.tip.split('|');
    let html = `<h4>${parts[0]}</h4>`;
    for (let i = 1; i < parts.length; i++) {
      const line = parts[i].trim();
      if (line.startsWith('Status:')) {
        const status = line.replace('Status: ', '');
        const cls = status === 'Live' ? 'stat' : status === 'Planned' ? 'planned-tag' : 'stat';
        html += `<div class="${cls}">${line}</div>`;
      } else if (line.match(/^\d/) || line.match(/^\~/)) {
        html += `<div class="stat">${line}</div>`;
      } else {
        html += `<div>${line}</div>`;
      }
    }
    tooltip.innerHTML = html;
    tooltip.classList.add('show');
  });

  el.addEventListener('mousemove', e => {
    const x = Math.min(e.clientX + 12, window.innerWidth - 340);
    const y = Math.min(e.clientY + 12, window.innerHeight - 200);
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  });

  el.addEventListener('mouseleave', () => {
    tooltip.classList.remove('show');
  });
});
</script>
